<!DOCTYPE html>

<html lang="zh-TW"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金狐狸有限公司 — 採購成本試算工具</title>
<style>
:root{
  --bg:#f9f9f8;
  --surface-1:#ffffff;
  --surface-2:#f3f3f2;
  --border:#e5e5e4;
  --border-accent:#2e7d32;
  --text-primary:#1a1a1a;
  --text-secondary:#555;
  --text-muted:#888;
  --text-accent:#2e7d32;
  --text-danger:#c0392b;
  --text-success:#2e7d32;
  --text-warning:#7d6000;
  --bg-accent:#e8f5e9;
  --bg-danger:#fdecea;
  --bg-warning:#fffde7;
  --bg-success:#e8f5e9;
  --fill-accent:#2e7d32;
  --on-accent:#fff;
  --radius:8px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--bg);min-height:100vh}
.header{background:#1a1a1a;color:#fff;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:.75rem}
.header .logo{font-size:20px}
.header h1{font-size:16px;font-weight:500;letter-spacing:.02em}
.header .sub{font-size:12px;color:#999;margin-top:2px}
.container{max-width:860px;margin:0 auto;padding:1.5rem}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
.section-sub{font-size:12px;color:var(--text-muted);margin-bottom:.75rem;margin-top:-.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:400px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:13px;color:var(--text-secondary)}
.field input{font-size:14px;padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);height:36px;width:100%}
.field input:focus{outline:none;border-color:var(--border-accent)}
.field .hint{font-size:11px;color:var(--text-muted)}
.divider{height:0.5px;background:var(--border);margin:1rem 0}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:var(--surface-1);border-radius:var(--radius);padding:.875rem}
.metric .mlabel{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.metric .mval{font-size:18px;font-weight:500}
.metric .msub{font-size:11px;color:var(--text-muted);margin-top:2px}
.metric.hi{background:var(--bg-accent)}
.metric.hi .mlabel{color:var(--text-accent)}
.metric.hi .mval{color:var(--text-accent)}
.price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:.5rem}
.pc{border:0.5px solid var(--border);border-radius:var(--radius);padding:.75rem;background:var(--surface-1)}
.pc .pt{font-size:11px;color:var(--text-muted)}
.pc .pv{font-size:16px;font-weight:500;margin:2px 0}
.pc .pm{font-size:11px;color:var(--text-muted)}
.pc.p30 .pv{color:#185FA5}
.pc.p40 .pv{color:#3B6D11}
.pc.p50 .pv{color:#993C1D}
.lock-btn{width:100%;margin-top:1rem;padding:9px;border:0.5px solid var(--border-accent);border-radius:var(--radius);background:var(--bg-accent);color:var(--text-accent);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.02em}
.lock-btn:hover{background:var(--fill-accent);color:var(--on-accent)}
.locked-list{display:flex;flex-direction:column;gap:8px}
.locked-item{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:.875rem;display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px}
.locked-name{font-size:13px;font-weight:600}
.locked-detail{font-size:12px;color:var(--text-muted);margin-top:2px}
.locked-cost{font-size:15px;font-weight:600;color:var(--text-accent);text-align:right}
.locked-cost-sub{font-size:11px;color:var(--text-muted);text-align:right;margin-top:2px}
.del-btn{background:none;border:0.5px solid var(--border);cursor:pointer;color:var(--text-muted);font-size:16px;padding:6px 10px;border-radius:var(--radius)}
.del-btn:hover{color:var(--text-danger);background:var(--bg-danger);border-color:var(--text-danger)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.smetric{background:var(--surface-1);border-radius:var(--radius);padding:1rem}
.smetric .sl{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.smetric .sv{font-size:20px;font-weight:500}
.smetric .ss{font-size:11px;color:var(--text-muted);margin-top:2px}
.smetric.big{background:var(--bg-success)}
.smetric.big .sl{color:var(--text-success)}
.smetric.big .sv{color:var(--text-success)}
.empty{font-size:13px;color:var(--text-muted);text-align:center;padding:1.5rem;border:0.5px dashed var(--border);border-radius:var(--radius)}
.tag-worst{font-size:10px;background:var(--bg-warning);color:var(--text-warning);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle}
.vol-badge{font-size:11px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text-secondary);display:inline-block;margin-top:.25rem}
.info-box{font-size:12px;color:var(--text-muted);background:var(--surface-1);border-radius:var(--radius);padding:.875rem;margin-top:1rem;line-height:1.6;border:0.5px solid var(--border)}
.breakdown{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem}
.breakdown tr td{padding:5px 2px;border-bottom:0.5px solid var(--border)}
.breakdown tr:last-child td{border:none;font-weight:600}
.breakdown .sub-row td{color:var(--text-muted);padding-left:12px}
.breakdown td:last-child{text-align:right}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🦊</div>
  <div>
    <div class="sub">金狐狸有限公司</div>
    <h1>採購成本試算工具</h1>
  </div>
</div>

<div class="container">

<div class="card">
  <div class="card-title">全域設定</div>
  <div class="grid4">
    <div class="field"><label>JPY → NTD 匯率</label><input type="number" id="jpyRate" value="0.215" step="0.001" oninput="calc()"><span class="hint">例：0.215</span></div>
    <div class="field"><label>USD → NTD 匯率</label><input type="number" id="usdRate" value="32.5" step="0.1" oninput="calc()"><span class="hint">例：32.5</span></div>
    <div class="field"><label>貿易商服務費（%）</label><input type="number" id="traderFee" value="15" step="1" oninput="calc()"><span class="hint">固定 15%</span></div>
    <div class="field"><label>進口關稅率（%）</label><input type="number" id="tariff" value="10" step="1" oninput="calc()"><span class="hint">依HS稅則</span></div>
  </div>
</div>

<div class="card">
  <div class="card-title">單一品牌方試算 <span class="tag-worst">最壞情境（單獨出貨）</span></div>
  <div class="section-sub">假設此品牌方單獨出貨，算出最高落地成本上限。確認後鎖定加入整批彙整。</div>

  <div class="grid2" style="margin-bottom:10px">
    <div class="field"><label>品牌方名稱</label><input type="text" id="bName" placeholder="例：COREFORCE" oninput="calc()"></div>
    <div class="field"><label>商品名稱</label><input type="text" id="bProduct" placeholder="例：手套 CF-2026" oninput="calc()"></div>
  </div>
  <div class="grid3" style="margin-bottom:10px">
    <div class="field"><label>品牌方單價（JPY）</label><input type="number" id="bPrice" value="0" step="1" oninput="calc()"></div>
    <div class="field"><label>採購數量（件）</label><input type="number" id="bQty" value="0" step="1" oninput="calc()"></div>
    <div class="field"><label>損耗備品（%）</label><input type="number" id="bLoss" value="5" step="1" oninput="calc()"><span class="hint">建議 5%</span></div>
  </div>

  <div class="divider"></div>
  <div class="card-title" style="margin-bottom:.5rem">貨物尺寸與運費</div>
  <div class="grid4" style="margin-bottom:10px">
    <div class="field"><label>長（cm）</label><input type="number" id="bL" value="0" step="1" oninput="calc()"></div>
    <div class="field"><label>寬（cm）</label><input type="number" id="bW" value="0" step="1" oninput="calc()"></div>
    <div class="field"><label>高（cm）</label><input type="number" id="bH" value="0" step="1" oninput="calc()"></div>
    <div class="field"><label>實際重量（kg）</label><input type="number" id="bWt" value="0" step="0.1" oninput="calc()"></div>
  </div>
  <div class="grid3">
    <div class="field"><label>每公斤運費（JPY）</label><input type="number" id="bRateJPY" value="0" step="10" oninput="calc()"><span class="hint">填JPY或USD擇一</span></div>
    <div class="field"><label>每公斤運費（USD）</label><input type="number" id="bRateUSD" value="0" step="0.1" oninput="calc()"><span class="hint">填JPY或USD擇一</span></div>
    <div class="field"><label>報關費（NTD）</label><input type="number" id="bCustoms" value="2500" step="100" oninput="calc()"><span class="hint">約 2,000–3,500／批</span></div>
  </div>

  <div class="divider"></div>
  <div id="singleResult"><div class="empty">填入品牌方資料後顯示結果</div></div>
  <button class="lock-btn" onclick="lockItem()">🔒 鎖定此品牌方，加入整批彙整</button>
</div>

<div class="card">
  <div class="card-title">整批彙整</div>
  <div id="lockedList"><div class="empty">尚未鎖定任何品牌方<br>在上方試算後點「鎖定」加入</div></div>
  <div id="summaryArea"></div>
</div>

</div>

<script>
let locked=[];
function v(id){return parseFloat(document.getElementById(id).value)||0;}
function s(id){return document.getElementById(id).value.trim();}
function fmt(n){return Math.round(n).toLocaleString();}

function calcSingle(){
  const jpyRate=v('jpyRate'),usdRate=v('usdRate');
  const traderFeePct=v('traderFee')/100;
  const tariffPct=v('tariff')/100;
  const price=v('bPrice'),qty=v('bQty'),lossPct=v('bLoss')/100;
  const L=v('bL'),W=v('bW'),H=v('bH'),wt=v('bWt');
  const rateJPY=v('bRateJPY'),rateUSD=v('bRateUSD');
  const customs=v('bCustoms');
  const volWt=L*W*H/6000;
  const chargeWt=Math.max(volWt,wt);
  const freightNTD=chargeWt*(rateJPY>0?rateJPY*jpyRate:rateUSD*usdRate);
  const brandNTD=price*qty*jpyRate;
  const traderFeeNTD=brandNTD*traderFeePct;
  const cifNTD=brandNTD+freightNTD;
  const tariffNTD=cifNTD*tariffPct;
  const vatNTD=(cifNTD+tariffNTD)*0.05;
  const lossNTD=(brandNTD+traderFeeNTD)*lossPct;
  const totalNTD=brandNTD+traderFeeNTD+freightNTD+tariffNTD+vatNTD+customs+lossNTD;
  const perUnit=qty>0?totalNTD/qty:0;
  return{brandNTD,traderFeeNTD,freightNTD,tariffNTD,vatNTD,lossNTD,customs,totalNTD,perUnit,qty,volWt,chargeWt};
}

function calc(){
  const r=calcSingle();
  const el=document.getElementById('singleResult');
  if(!r.qty||!v('bPrice')){el.innerHTML='<div class="empty">填入品牌方資料後顯示結果</div>';return;}
  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="mlabel">品牌方採購金額</div><div class="mval">NT$${fmt(r.brandNTD)}</div><div class="msub">¥${fmt(v('bPrice')*r.qty)}</div></div>
      <div class="metric"><div class="mlabel">運費（計費重 ${r.chargeWt.toFixed(1)}kg）</div><div class="mval">NT$${fmt(r.freightNTD)}</div><div class="msub">材積 ${r.volWt.toFixed(1)}kg vs 實重 ${v('bWt')}kg</div></div>
      <div class="metric"><div class="mlabel">關稅＋營業稅</div><div class="mval">NT$${fmt(r.tariffNTD+r.vatNTD)}</div></div>
      <div class="metric"><div class="mlabel">服務費＋損耗＋報關</div><div class="mval">NT$${fmt(r.traderFeeNTD+r.lossNTD+r.customs)}</div></div>
      <div class="metric hi"><div class="mlabel">每件落地成本</div><div class="mval">NT$${fmt(r.perUnit)}</div><div class="msub">總額 NT$${fmt(r.totalNTD)}</div></div>
    </div>
    <table class="breakdown">
      ${[
        ['品牌方採購金額（換算NTD）',r.brandNTD,false],
        ['貿易商服務費 '+v('traderFee')+'%',r.traderFeeNTD,true],
        ['運費',r.freightNTD,true],
        ['進口關稅 '+v('tariff')+'%',r.tariffNTD,true],
        ['進口營業稅 5%',r.vatNTD,true],
        ['報關費',r.customs,true],
        ['損耗備品 '+v('bLoss')+'%',r.lossNTD,true],
        ['合計落地成本',r.totalNTD,false],
      ].map(([l,val,sub])=>`<tr class="${sub?'sub-row':''}"><td>${l}</td><td>NT$ ${fmt(val)}</td></tr>`).join('')}
    </table>
    <div class="price-row">
      ${[[30,'p30'],[40,'p40'],[50,'p50']].map(([pct,cls])=>{
        const p=r.perUnit/(1-pct/100);
        return`<div class="pc ${cls}"><div class="pt">毛利 ${pct}%</div><div class="pv">NT$${fmt(p)}</div><div class="pm">每件毛利 +NT$${fmt(p-r.perUnit)}</div></div>`;
      }).join('')}
    </div>`;
}

function lockItem(){
  const r=calcSingle();
  const name=s('bName')||'品牌方';
  const product=s('bProduct')||'商品';
  if(!r.qty||!v('bPrice')){alert('請先填入品牌方單價和數量');return;}
  locked.push({name,product,qty:r.qty,perUnit:r.perUnit,totalNTD:r.totalNTD,brandNTD:r.brandNTD,id:Date.now()});
  renderLocked();
}

function removeLocked(id){
  locked=locked.filter(x=>x.id!==id);
  renderLocked();
}

function renderLocked(){
  const el=document.getElementById('lockedList');
  if(!locked.length){
    el.innerHTML='<div class="empty">尚未鎖定任何品牌方<br>在上方試算後點「鎖定」加入</div>';
    document.getElementById('summaryArea').innerHTML='';
    return;
  }
  el.innerHTML=`<div class="locked-list">${locked.map(b=>`
    <div class="locked-item">
      <div>
        <div class="locked-name">${b.name} <span style="font-weight:400;color:var(--text-muted);font-size:12px">${b.product}</span></div>
        <div class="locked-detail">${fmt(b.qty)} 件 ｜ 品牌方採購 NT$${fmt(b.brandNTD)} ｜ 總落地 NT$${fmt(b.totalNTD)}</div>
        <div class="vol-badge">每件落地成本 NT$${fmt(b.perUnit)}（最壞情境）</div>
      </div>
      <div>
        <div class="locked-cost">NT$${fmt(b.perUnit)}</div>
        <div class="locked-cost-sub">/件</div>
      </div>
      <button class="del-btn" onclick="removeLocked(${b.id})">✕</button>
    </div>`).join('')}</div>`;

  const totalQty=locked.reduce((s,b)=>s+b.qty,0);
  const totalBrand=locked.reduce((s,b)=>s+b.brandNTD,0);
  const totalAll=locked.reduce((s,b)=>s+b.totalNTD,0);
  const saving=totalAll-totalBrand;

  document.getElementById('summaryArea').innerHTML=`
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem">整批彙整（各自出貨最壞情境）</div>
    <div class="summary-grid" style="margin-bottom:1rem">
      <div class="smetric"><div class="sl">總品牌方數</div><div class="sv">${locked.length} 家</div></div>
      <div class="smetric"><div class="sl">總採購件數</div><div class="sv">${fmt(totalQty)} 件</div></div>
      <div class="smetric"><div class="sl">品牌方採購金額</div><div class="sv">NT$${fmt(totalBrand)}</div></div>
      <div class="smetric"><div class="sl">物流＋稅費合計</div><div class="sv">NT$${fmt(saving)}</div></div>
      <div class="smetric big"><div class="sl">整批總落地成本</div><div class="sv">NT$${fmt(totalAll)}</div><div class="ss">合批出貨後實際更低</div></div>
    </div>
    <div class="info-box">💡 以上為各品牌方「單獨出貨」的最壞情境總和。實際合批出貨時運費共用，總成本會更低。合批後可在上方重新填入實際合批運費，再鎖定一次比較差異。</div>`;
}

calc();
</script>


</body></html>
